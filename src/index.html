<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="author" content="Kaj Kowalski">
		<meta name="source" content="https://github.com/kjanat/404.git">
		<meta name="description" content="A custom 404 page for KajKowalski Edge.">
		<meta name="keywords" content="404, not found, error, page, kajkowalski, edge">
		<title>404 | KajKowalski Edge</title>
		<meta name="robots" content="noindex, nofollow">
		<link rel="stylesheet" href="styles.css">
		<script type="module" src="index.ts"></script>
		<!-- @inline early-theme.ts -->
	</head>

	<body>
		<canvas class="storm-canvas" aria-hidden="true" data-storm-renderer="pending" data-storm-active="false"></canvas>
		<main class="panel">
			<canvas class="panel-light-canvas" aria-hidden="true" data-panel-light-renderer="pending"></canvas>
			<div class="brandline" data-reveal="1">
				<img
					class="edge-icon"
					src="icon.svg?inline"
					alt="KajKowalski Edge icon"
					width="28"
					height="28"
				>
				<p class="kicker">
					KajKowalski <button
						class="edge-word"
						type="button"
						data-tip="I'm edging so hard right now!"
					>
						Edge
					</button>
				</p>
			</div>
			<h1 data-reveal="2" data-headline>404 — This host is not configured</h1>
			<p data-reveal="3" data-blurb>You've reached a server that doesn't have a site set up for this domain.</p>
			<button
				class="theme-trigger"
				type="button"
				data-theme-dock-toggle
				aria-expanded="false"
				aria-controls="theme-drawer"
				aria-label="Scene settings"
				data-reveal="4"
			>
				<svg
					class="theme-trigger__icon"
					width="18"
					height="18"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
					aria-hidden="true"
				>
					<circle cx="12" cy="12" r="3" />
					<path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
				</svg>
			</button>
			<div class="theme-drawer" id="theme-drawer" data-theme-drawer hidden>
				<span class="theme-dock__label">Scene mode</span>
				<fieldset class="theme-switch" data-theme-switch aria-label="Theme mode">
					<label class="theme-option">
						<input
							class="theme-option__input"
							type="radio"
							name="theme-preference"
							value="system"
							data-theme-option="system"
							checked
						>
						<span class="theme-option__label">auto</span>
					</label>
					<label class="theme-option">
						<input
							class="theme-option__input"
							type="radio"
							name="theme-preference"
							value="dark"
							data-theme-option="dark"
						>
						<span class="theme-option__label">dark</span>
					</label>
					<label class="theme-option">
						<input
							class="theme-option__input"
							type="radio"
							name="theme-preference"
							value="light"
							data-theme-option="light"
						>
						<span class="theme-option__label">light</span>
					</label>
				</fieldset>
			</div>
		</main>
	</body>
</html>
