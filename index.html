<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="author" content="Kaj Kowalski">
		<meta name="source" content="https://github.com/kjanat/404.git">
		<meta name="description" content="A custom 404 page for KajKowalski Edge.">
		<meta name="keywords" content="404, not found, error, page, kajkowalski, edge">
		<meta name="robots" content="noindex, nofollow">
		<title>404 | Kajkowalski Edge</title>
		<link rel="icon" href="/favicon.ico" type="image/x-icon" sizes="16x16 32x32 48x48">
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any">
		<link rel="stylesheet" href="/src/styles.css">
		<script type="module" src="/src/index.ts"></script>
	</head>

	<body>
		<svg aria-hidden="true" style="position: absolute; width: 0; height: 0; overflow: hidden">
			<defs>
				<filter id="cloud-tex" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
					<feTurbulence
						type="fractalNoise"
						baseFrequency="0.003 0.0025"
						numOctaves="4"
						seed="3"
						stitchTiles="stitch"
						result="noise"
					/>
					<feComponentTransfer in="noise" result="shaped">
						<feFuncA type="table" tableValues="0 0 0 0 0.3 0.8 1 1 1" />
					</feComponentTransfer>
					<feGaussianBlur in="shaped" stdDeviation="4" result="soft" />
					<feComposite operator="in" in="SourceGraphic" in2="soft" />
				</filter>
			</defs>
		</svg>
		<div class="storm-regions" aria-hidden="true"></div>
		<div class="storm-streaks" aria-hidden="true">
			<span class="storm-streak storm-streak-a"></span>
			<span class="storm-streak storm-streak-b"></span>
			<span class="storm-streak storm-streak-c"></span>
		</div>
		<main class="panel">
			<div class="brandline">
				<img
					class="edge-icon"
					src="/src/icon.svg?inline=true"
					alt="KajKowalski Edge icon"
					width="28"
					height="28"
				>
				<p class="kicker">
					KajKowalski <span
						class="edge-word"
						tabindex="0"
						data-tip="I'm edging so hard right now!"
					>Edge</span>
				</p>
			</div>
			<h1>404 - This host is not configured.</h1>
			<p>
				<span class="font-bold break-all text-accent-2" data-host>this hostname</span>
				isn't set up yet, so there's nothing to show here right now. If you expected something here, check the address
				and try again.
			</p>
		</main>
	</body>
</html>
