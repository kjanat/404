<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>404 | Kajkowalski Edge</title>
		<link rel="icon" href="/favicon.svg" type="image/svg+xml">
		<link rel="alternate icon" href="/favicon.ico">
		<link rel="stylesheet" href="src/styles.css">
	</head>

	<body>
		<div class="storm-regions" aria-hidden="true"></div>
		<div class="storm-streaks" aria-hidden="true">
			<span class="storm-streak storm-streak-a"></span>
			<span class="storm-streak storm-streak-b"></span>
			<span class="storm-streak storm-streak-c"></span>
		</div>
		<main class="panel">
			<div class="brandline">
				<img
					class="edge-icon"
					src="/favicon.svg"
					alt="KajKowalski Edge icon"
					width="28"
					height="28"
				>
				<p class="kicker">
					KajKowalski <span
						class="edge-word"
						tabindex="0"
						data-tip="I'm edging so hard right now!"
					>Edge</span>
				</p>
			</div>
			<h1>404 - This host is not configured.</h1>
			<p>
				<span class="font-bold break-all text-accent-2" data-host
				>this hostname</span>
				isn't set up yet, so there's nothing to show here right now.<br>
				If you expected something here, check the address and try again.
			</p>
		</main>
		<script type="module" src="src/index.ts"></script>
	</body>
</html>
