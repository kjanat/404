<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="author" content="Kaj Kowalski">
		<meta name="source" content="https://github.com/kjanat/404.git">
		<meta name="description" content="A custom 404 page for KajKowalski Edge.">
		<meta name="keywords" content="404, not found, error, page, kajkowalski, edge">
		<meta name="robots" content="noindex, nofollow">
		<title>404 | Kajkowalski Edge</title>
		<!-- @inline src/early-theme.ts -->
		<link rel="stylesheet" href="/src/styles.css">
		<script type="module" src="/src/index.ts"></script>
	</head>

	<body>
		<svg aria-hidden="true" style="position: absolute; width: 0; height: 0; overflow: hidden">
			<defs>
				<filter id="cloud-tex" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
					<feTurbulence
						type="fractalNoise"
						baseFrequency="0.003 0.0025"
						numOctaves="4"
						seed="3"
						stitchTiles="stitch"
						result="noise"
					/>
					<feComponentTransfer in="noise" result="shaped">
						<feFuncA type="table" tableValues="0 0 0 0 0.3 0.8 1 1 1" />
					</feComponentTransfer>
					<feGaussianBlur in="shaped" stdDeviation="4" result="soft" />
					<feComposite operator="in" in="SourceGraphic" in2="soft" />
				</filter>
			</defs>
		</svg>
		<div class="storm-regions" aria-hidden="true"></div>
		<div class="storm-streaks" aria-hidden="true"></div>
		<div class="cinema-matte" aria-hidden="true"></div>
		<main class="panel">
			<div class="brandline" data-reveal="1">
				<img
					class="edge-icon"
					src="/src/icon.svg?inline=true"
					alt="KajKowalski Edge icon"
					width="28"
					height="28"
				>
				<p class="kicker">
					KajKowalski <span
						class="edge-word"
						tabindex="0"
						data-tip="I'm edging so hard right now!"
					>Edge</span>
				</p>
			</div>
			<h1 data-reveal="2" data-headline>404 — This host is not configured</h1>
			<p data-reveal="3" data-blurb>You've reached a server that doesn't have a site set up for this domain.</p>
			<button
				class="theme-trigger"
				type="button"
				data-theme-dock-toggle
				aria-expanded="false"
				aria-controls="theme-drawer"
				aria-label="Scene settings"
				data-reveal="4"
			>
				<svg
					class="theme-trigger__icon"
					width="18"
					height="18"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
					aria-hidden="true"
				>
					<circle cx="12" cy="12" r="3" />
					<path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
				</svg>
			</button>
			<div class="theme-drawer" id="theme-drawer" data-theme-drawer hidden>
				<span class="theme-dock__label">Scene mode</span>
				<div class="theme-switch" data-theme-switch role="radiogroup" aria-label="Theme mode">
					<button class="theme-option" type="button" role="radio" data-theme-option="system" aria-checked="true">
						auto
					</button>
					<button class="theme-option" type="button" role="radio" data-theme-option="dark" aria-checked="false">
						dark
					</button>
					<button class="theme-option" type="button" role="radio" data-theme-option="light" aria-checked="false">
						light
					</button>
				</div>
			</div>
		</main>
	</body>
</html>
