name: Capture Animation
description: Capture preview media and upload it as an artifact.

inputs:
  width:        { description: "Capture width in pixels",             default: "1152"                   }
  height:       { description: "Capture height in pixels",            default: "648"                    }
  url:          { description: "URL to capture",                      default: "https://404.kjanat.com" }
  duration:     { description: "Capture duration in seconds",         default: "6"                      }
  fps:          { description: "Frames per second",                   default: "12"                     }
  quality:      { description: "WebP quality (0-100)",                default: "100"                    }
  max_mb:       { description: "Max output size in MB",               default: "3"                      }
  video_crf:    { description: "MP4 quality (0-51, lower is better)", default: "28"                     }
  ext:          { description: "Filetype to capture (webp, gif, mp4)",default: "webp"                   }
  color_scheme: { description: "Browser color scheme (light, dark)",  default: "dark"                    }

outputs:
  artifact-url:
    description: "URL to the uploaded artifact"
    value: ${{ steps.upload.outputs.artifact-url }}
  artifact-id:
    description: "ID of the uploaded artifact"
    value: ${{ steps.upload.outputs.artifact-id }}
  artifact-name:
    description: "Name of the uploaded artifact (e.g. preview-dark.webp)"
    value: "preview-${{ inputs.color_scheme }}.${{ inputs.ext }}"
  file-name:
    description: "Output file name"
    value: "preview-${{ inputs.color_scheme }}.${{ inputs.ext }}"
  color-scheme:
    description: "Color scheme that was captured"
    value: ${{ inputs.color_scheme }}

runs:
  using: composite
  steps:
    - name: Expose inputs as env vars
      shell: bash
      env:
        _WIDTH: ${{ inputs.width }}
        _HEIGHT: ${{ inputs.height }}
        _URL: ${{ inputs.url }}
        _DURATION: ${{ inputs.duration }}
        _FPS: ${{ inputs.fps }}
        _QUALITY: ${{ inputs.quality }}
        _MAX_MB: ${{ inputs.max_mb }}
        _VIDEO_CRF: ${{ inputs.video_crf }}
        _EXT: ${{ inputs.ext }}
        _COLOR_SCHEME: ${{ inputs.color_scheme }}
      run: |
        append_env() {
          local key="$1"
          local value="$2"
          local delimiter="EOF_$(date +%s%N)_$RANDOM"
          {
            printf '%s<<%s\n' "$key" "$delimiter"
            printf '%s\n' "$value"
            printf '%s\n' "$delimiter"
          } >> "$GITHUB_ENV"
        }

        append_env "INPUT_WIDTH" "$_WIDTH"
        append_env "INPUT_HEIGHT" "$_HEIGHT"
        append_env "INPUT_URL" "$_URL"
        append_env "INPUT_DURATION" "$_DURATION"
        append_env "INPUT_FPS" "$_FPS"
        append_env "INPUT_QUALITY" "$_QUALITY"
        append_env "INPUT_MAX_MB" "$_MAX_MB"
        append_env "INPUT_VIDEO_CRF" "$_VIDEO_CRF"
        append_env "INPUT_EXT" "$_EXT"
        append_env "INPUT_COLOR_SCHEME" "$_COLOR_SCHEME"
    - name: Validate inputs
      shell: bash
      run: |
        case "$INPUT_EXT" in
          webp|gif|mp4) ;;
          *)
            echo "Invalid INPUT_EXT value: $INPUT_EXT (allowed: webp, gif, mp4)" >&2
            exit 1
            ;;
        esac
        case "$INPUT_COLOR_SCHEME" in
          light|dark) ;;
          *)
            echo "Invalid INPUT_COLOR_SCHEME value: $INPUT_COLOR_SCHEME (allowed: light, dark)" >&2
            exit 1
            ;;
        esac
    - name: Setup JS toolchain
      uses: ./.github/actions/setup-node-bun
      with:
        install: "true"
        frozen-lockfile: "true"
    - uses: FedericoCarboni/setup-ffmpeg@v3
    - name: Install Playwright browser
      shell: bash
      run: bunx playwright install chromium
    - name: Build site for local capture fallback
      shell: bash
      run: bun run build
    - name: Build capture script for Node execution
      shell: bash
      run: |
        mkdir -p .capture-dist
        # Keep third-party packages external to avoid bundler/runtime mismatches
        # in Node 20 for playwright-extra + stealth plugin internals.
        bun build scripts/capture.ts --target node --packages external --outfile .capture-dist/capture.mjs
    - name: Generate animation
      shell: bash
      run: |
        max_bytes="$(
          awk -v mb="$INPUT_MAX_MB" '
            BEGIN {
              if (mb ~ /^[0-9]+([.][0-9]+)?$/) {
                printf "%.0f", mb * 1024 * 1024;
                exit 0;
              }
              exit 1;
            }
          '
        )" || {
          echo "Invalid INPUT_MAX_MB value: $INPUT_MAX_MB" >&2
          exit 1
        }

        # Start a local preview server from the freshly built dist/ so captures
        # always reflect the current commit (immune to CDN/edge-cache staleness).
        bunx vite preview --port 4174 &
        LOCAL_PID=$!
        # Wait for the server to be ready
        for i in $(seq 1 30); do
          curl -sf http://localhost:4174 >/dev/null 2>&1 && break
          sleep 0.5
        done

        # Rewrite the capture URL to use the local server with the original hostname
        CAPTURE_HOST="${INPUT_URL#*://}"
        CAPTURE_HOST="${CAPTURE_HOST%%/*}"
        CAPTURE_HOST="${CAPTURE_HOST%%\?*}"
        LOCAL_URL="http://localhost:4174?host=${CAPTURE_HOST}"

        node .capture-dist/capture.mjs \
          -w "$INPUT_WIDTH" -h "$INPUT_HEIGHT" \
          --url "$LOCAL_URL" -d "$INPUT_DURATION" --fps "$INPUT_FPS" \
          -q "$INPUT_QUALITY" --max-bytes "$max_bytes" \
          --video-crf "$INPUT_VIDEO_CRF" \
          --color-scheme "$INPUT_COLOR_SCHEME" \
          -o "preview-$INPUT_COLOR_SCHEME.$INPUT_EXT"

        kill "$LOCAL_PID" 2>/dev/null || true
    - id: upload
      uses: actions/upload-artifact@v7
      with:
        name: "preview-${{ inputs.color_scheme }}.${{ inputs.ext }}"
        path: "preview-${{ inputs.color_scheme }}.${{ inputs.ext }}"
        if-no-files-found: error
    - name: Publish capture summary
      uses: ./.github/actions/capture/summary
      with:
        artifact-url: ${{ steps.upload.outputs.artifact-url }}
        color-scheme: ${{ inputs.color_scheme }}
