name: Capture Animation
description: Capture preview media and upload it as an artifact.

inputs:
  width: { description: "Capture width in pixels", default: "1152" }
  height: { description: "Capture height in pixels", default: "648" }
  url: { description: "URL to capture", default: "https://404.kjanat.com" }
  duration: { description: "Capture duration in seconds", default: "6" }
  fps: { description: "Frames per second", default: "12" }
  quality: { description: "WebP quality (0-100)", default: "100" }
  max_mb: { description: "Max output size in MB", default: "3" }
  video_crf: { description: "MP4 quality (0-51, lower is better)", default: "28" }
  ext: { description: "Filetype to capture (webp, gif, mp4)", default: "webp" }
  color_scheme: { description: "Browser color scheme (light, dark)", default: "dark" }

outputs:
  artifact-url:
    description: "URL to the uploaded artifact"
    value: ${{ steps.upload.outputs.artifact-url }}
  artifact-id:
    description: "ID of the uploaded artifact"
    value: ${{ steps.upload.outputs.artifact-id }}
  artifact-name:
    description: "Name of the uploaded artifact (e.g. preview-dark.webp)"
    value: "preview-${{ inputs.color_scheme }}.${{ inputs.ext }}"
  file-name:
    description: "Output file name"
    value: "preview-${{ inputs.color_scheme }}.${{ inputs.ext }}"
  color-scheme:
    description: "Color scheme that was captured"
    value: ${{ inputs.color_scheme }}

runs:
  using: composite
  steps:
    - name: Expose inputs as env vars
      shell: bash
      env:
        _WIDTH: ${{ inputs.width }}
        _HEIGHT: ${{ inputs.height }}
        _URL: ${{ inputs.url }}
        _DURATION: ${{ inputs.duration }}
        _FPS: ${{ inputs.fps }}
        _QUALITY: ${{ inputs.quality }}
        _MAX_MB: ${{ inputs.max_mb }}
        _VIDEO_CRF: ${{ inputs.video_crf }}
        _EXT: ${{ inputs.ext }}
        _COLOR_SCHEME: ${{ inputs.color_scheme }}
      run: '"${{ github.action_path }}/scripts/expose-inputs.sh"'
    - name: Validate inputs
      shell: bash
      run: '"${{ github.action_path }}/scripts/validate-inputs.sh"'
    - name: Setup JS toolchain
      uses: ./.github/actions/setup-node-bun
      with:
        install: "true"
        frozen-lockfile: "true"
    - uses: FedericoCarboni/setup-ffmpeg@v3
    - name: Install Playwright browser
      shell: bash
      run: bunx playwright install chromium
    - name: Build site for local capture fallback
      shell: bash
      run: bun run build
    - name: Build capture script for Node execution
      shell: bash
      run: '"${{ github.action_path }}/scripts/build-capture.sh"'
    - name: Generate animation
      shell: bash
      run: '"${{ github.action_path }}/scripts/generate-animation.sh"'
    - id: upload
      uses: actions/upload-artifact@v7
      with:
        name: "preview-${{ inputs.color_scheme }}.${{ inputs.ext }}"
        path: "preview-${{ inputs.color_scheme }}.${{ inputs.ext }}"
        if-no-files-found: error
    - name: Publish capture summary
      uses: ./.github/actions/capture/summary
      with:
        artifact-url: ${{ steps.upload.outputs.artifact-url }}
        color-scheme: ${{ inputs.color_scheme }}
