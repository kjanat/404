name: Create Capture PR
description: Commit preview artifacts and create a pull request.
inputs:
  ext:
    description: "Artifact extension to download (webp, gif, mp4)"
    required: true
  color_scheme:
    description: "Color scheme(s) captured (both, dark, light)"
    required: true
outputs:
  pr-url:
    description: "URL of the created pull request"
    value: ${{ steps.create_pr.outputs.pr-url }}
runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_EXT: ${{ inputs.ext }}
        INPUT_COLOR_SCHEME: ${{ inputs.color_scheme }}
      run: |
        case "$INPUT_EXT" in
          webp|gif|mp4) ;;
          *)
            echo "Invalid ext input: $INPUT_EXT (allowed: webp, gif, mp4)" >&2
            exit 1
            ;;
        esac
        case "$INPUT_COLOR_SCHEME" in
          both|dark|light) ;;
          *)
            echo "Invalid color_scheme input: $INPUT_COLOR_SCHEME (allowed: both, dark, light)" >&2
            exit 1
            ;;
        esac
    - uses: actions/download-artifact@v7
      with:
        pattern: "preview-*.${{ inputs.ext }}"
        merge-multiple: true
    - name: Commit, push and create PR
      id: create_pr
      uses: actions/github-script@v8
      with:
        script: |
          const { default: run } = await import(`${process.env.GITHUB_WORKSPACE}/.github/actions/capture/create-capture-pr.mjs`)
          await run({ github, context, core, exec })
