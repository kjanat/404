name: Create Capture PR
description: Commit preview artifact and create a pull request.
inputs:
  ext:
    description: "Artifact extension to download (webp, gif, mp4)"
    required: true
outputs:
  pr-url:
    description: "URL of the created pull request"
    value: ${{ steps.create_pr.outputs.pr-url }}
runs:
  using: composite
  steps:
    - name: Validate artifact extension
      shell: bash
      env:
        INPUT_EXT: ${{ inputs.ext }}
      run: |
        case "$INPUT_EXT" in
          webp|gif|mp4) ;;
          *)
            echo "Invalid ext input: $INPUT_EXT (allowed: webp, gif, mp4)" >&2
            exit 1
            ;;
        esac
    - uses: actions/download-artifact@v7
      with:
        name: preview.${{ inputs.ext }}
        path: .
    - name: Commit, push and create PR
      id: create_pr
      uses: actions/github-script@v8
      with:
        script: |
          const { default: run } = await import(`${process.env.GITHUB_WORKSPACE}/.github/actions/capture/create-capture-pr.mjs`)
          await run({ github, context, core, exec })
