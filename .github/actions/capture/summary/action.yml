name: Capture Summary
description: Publish capture settings and artifact link to the job summary.

inputs:
  artifact-url:
    description: "URL of the uploaded capture artifact"
    required: true
  color-scheme:
    description: "Color scheme used for this capture"
    required: true
  capture-inputs:
    description: "JSON-serialized capture inputs map"
    required: true

runs:
  using: composite
  steps:
    - name: Write capture summary
      uses: actions/github-script@v8
      env:
        ARTIFACT_URL: ${{ inputs.artifact-url }}
        COLOR_SCHEME: ${{ inputs.color-scheme }}
        CAPTURE_INPUTS: ${{ inputs.capture-inputs }}
      with:
        script: |
          const { default: run } = await import("${{ github.action_path }}/../capture-summary.mjs")
          await run({ context, core })
