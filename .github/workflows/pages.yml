# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Deploy to GitHub Pages
run-name: "Deploy \"${{ github.event.head_commit.message }}\" by @${{ github.actor }}"
on: { push: { branches: [master] } }
permissions: { contents: read, pages: write, id-token: write }
concurrency: { group: pages, cancel-in-progress: false }
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: "${{ steps.deployment.outputs.page_url }}" }
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }
      - uses: ./.github/actions/setup-node-bun
        with: { install: "true", frozen-lockfile: "true" }
      - uses: actions/configure-pages@v6
      - run: bun bd
      - run: mkdir -p pages-artifact && cp index.html favicon.ico pages-artifact/ && cp index.html pages-artifact/404.html
      - uses: actions/upload-pages-artifact@v5
        with: { path: pages-artifact }
      - id: deployment
        uses: actions/deploy-pages@v5
