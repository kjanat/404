name: Lint
on: { push: {}, pull_request: {} }
permissions: { contents: read }
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun i
      - name: HTMLHint
        run: bun lint:html
      - name: Stylelint
        run: bun lint:css
      - name: ESLint
        run: bun lint:js
