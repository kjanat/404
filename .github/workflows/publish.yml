# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Publish to npm
run-name: "Publish ${{ github.event.release.tag_name || github.ref_name }} to npm"
on:
  release:
    types: [published]

concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: ${{ steps.version.outputs.npm_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/version-check
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: lts/*, registry-url: https://registry.npmjs.org }
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - id: version
        run: |
          VERSION=$(jq -r .version package.json)
          NAME=$(jq -r .name package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "npm_url=https://www.npmjs.com/package/${NAME}/v/${VERSION}" |& tee -a "$GITHUB_OUTPUT"
      - run: bun bd
      # bun publish lacks --provenance; use npm for signed provenance
      - run: npm i -g npm && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
