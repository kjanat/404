# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Publish to npm
run-name: "Publish ${{ github.event.release.tag_name || github.ref_name }} to npm"
on: { release: { types: [published] } }
concurrency: { group: publish-npm, cancel-in-progress: false }
permissions: { contents: read, id-token: write }

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: { name: npm, url: "${{ steps.version.outputs.npm_url }}" }
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }
      - uses: ./.github/actions/version-check
      - uses: actions/setup-node@v6
        with: { node-version: latest, registry-url: https://registry.npmjs.org, package-manager-cache: false }
      - uses: oven-sh/setup-bun@v2
        with: { no-cache: true }
      - uses: kjanat/runner@master
      - run: runner install --frozen bd
      - id: version
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $version = $pkg.version; $name = $pkg.name
          $url = @("https://npm.im/package", $name, "v", $version) -join "/"
          "version=$version`nnpm_url=$url" | Tee-Object -LiteralPath $env:GITHUB_OUTPUT -Append -Encoding utf8
      # bun publish lacks --provenance; use npm for signed provenance
      - run: bunx npm@latest publish --provenance --access public
