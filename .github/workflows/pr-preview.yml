name: PR Preview Screenshots
run-name: "Preview for PR #${{ github.event.pull_request.number }}"
on:
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pending:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post or update pending status
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha.substring(0, 7);
            const marker = '<!-- pr-preview-screenshots -->';
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;

            const body = [
              marker,
              `## 📸 Preview Screenshots`,
              ``,
              `> ⏳ **Nieuwe preview wordt gegenereerd...** [\`${headSha}\`](${runUrl})`,
              `>`,
              `> Dit wordt automatisch bijgewerkt zodra de captures klaar zijn.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              core.info(`Updated comment ${existing.id} to pending`);
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
              core.info('Created pending comment');
            }

  capture:
    if: github.event.action != 'closed'
    needs: pending
    strategy:
      matrix:
        color_scheme: [dark, light]
    name: "Capture ${{ matrix.color_scheme }}"
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/capture
        with:
          color_scheme: ${{ matrix.color_scheme }}
          duration: "5"
          quality: "90"

  comment:
    if: github.event.action != 'closed'
    needs: capture
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: "preview-*"
          merge-multiple: true
      - name: Push to preview branch and update comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha.substring(0, 7);
            const branch = `pr-preview/${prNumber}`;
            const marker = '<!-- pr-preview-screenshots -->';

            const tmpDir = '/tmp/previews';
            fs.mkdirSync(tmpDir, { recursive: true });
            const previewFiles = fs.readdirSync('.').filter(f => f.startsWith('preview-') && f.endsWith('.webp'));
            if (previewFiles.length === 0) {
              core.setFailed('No preview files found');
              return;
            }
            for (const f of previewFiles) {
              fs.copyFileSync(f, path.join(tmpDir, f));
            }

            await exec.exec('git', ['config', 'user.name', 'github-actions[bot]']);
            await exec.exec('git', ['config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com']);
            await exec.exec('git', ['checkout', '--orphan', branch]);
            await exec.exec('git', ['rm', '-rf', '.']);

            for (const f of previewFiles) {
              fs.copyFileSync(path.join(tmpDir, f), f);
            }

            await exec.exec('git', ['add', ...previewFiles]);
            await exec.exec('git', ['commit', '-m', `Preview screenshots for PR #${prNumber}`]);
            await exec.exec('git', ['push', 'origin', branch, '--force']);

            const { stdout } = await exec.getExecOutput('git', ['rev-parse', 'HEAD']);
            const previewSha = stdout.trim();
            const rawBase = `https://raw.githubusercontent.com/${owner}/${repo}/${previewSha}`;

            const body = [
              marker,
              `## 📸 Preview Screenshots`,
              ``,
              `> Commit: \`${headSha}\` | [Workflow run](https://github.com/${owner}/${repo}/actions/runs/${context.runId})`,
              ``,
              ...previewFiles.map(f => {
                const scheme = f.replace('preview-', '').replace('.webp', '');
                return `### ${scheme.charAt(0).toUpperCase() + scheme.slice(1)}\n![${scheme} preview](${rawBase}/${f})`;
              }),
              ``,
              `_Auto-generated by PR Preview workflow_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              core.info(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
              core.info('Created preview comment');
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete preview branch
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = `pr-preview/${context.payload.pull_request.number}`;
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` });
              core.info(`Deleted branch ${branch}`);
            } catch (err) {
              if (err.status === 422) {
                core.info(`Branch ${branch} already deleted`);
              } else {
                throw err;
              }
            }
