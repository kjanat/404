name: autofix.ci
on:
  push: { branches: ["master"] }
  pull_request:
  workflow_call:
permissions: { contents: read }
jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - run: bun i; bun fmt --allow-no-files --diff --excludes ".github"
      - run: bun run dprint config update

      - uses: autofix-ci/action@v1
