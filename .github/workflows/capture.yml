name: Capture animation
run-name: "Capture preview (${{ inputs.color_scheme }}, ${{ inputs.ext }}, ${{ inputs.width }}x${{ inputs.height }})"
on:
  workflow_dispatch:
    inputs:
      width: { description: "Capture width in pixels", required: false, default: 1152, type: number }
      height: { description: "Capture height in pixels", required: false, default: 648, type: number }
      url: { description: "URL to capture", required: false, default: "https://unavailable.kajkowalski.nl", type: string }
      duration: { description: "Capture duration in seconds", required: false, default: 6, type: number }
      fps: { description: "Frames per second", required: false, default: 12, type: number }
      quality: { description: "WebP quality (0-100)", required: false, default: 100, type: number }
      max_mb: { description: "Max output size in MB (integer)", required: false, default: 3, type: number }
      video_crf: { description: "MP4 quality (0-51, lower is better)", required: false, default: 28, type: number }
      ext: { description: "Filetype to capture", required: false, default: webp, type: choice, options: [webp, gif, mp4] }
      color_scheme: { description: "Color scheme (both = dark+light in parallel)", required: false, default: both, type: choice, options: [both, dark, light] }
      create_pr: { description: "Open a PR committing the screenshot", required: false, default: false, type: boolean }
jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      schemes: ${{ steps.schemes.outputs.json }}
    steps:
      - id: schemes
        shell: bash
        env:
          SCHEME: ${{ inputs.color_scheme }}
        run: |
          case "$SCHEME" in
            both) echo 'json=["dark","light"]' ;;
            *)    echo "json=[\"$SCHEME\"]" ;;
          esac >> "$GITHUB_OUTPUT"

  capture:
    needs: resolve
    name: "Capture ${{ matrix.color_scheme }}"
    runs-on: ubuntu-latest
    permissions: { contents: read }
    strategy:
      matrix: { color_scheme: "${{ fromJSON(needs.resolve.outputs.schemes) }}" }
    steps:
      - uses: actions/checkout@v6
      - id: capture
        uses: ./.github/actions/capture
        with:
          width: ${{ inputs.width }}
          height: ${{ inputs.height }}
          url: ${{ inputs.url }}
          duration: ${{ inputs.duration }}
          fps: ${{ inputs.fps }}
          quality: ${{ inputs.quality }}
          max_mb: ${{ inputs.max_mb }}
          video_crf: ${{ inputs.video_crf }}
          ext: ${{ inputs.ext }}
          color_scheme: ${{ matrix.color_scheme }}

  pr:
    if: ${{ inputs.create_pr }}
    needs: capture
    name: Create preview pull request
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with: { ref: master }
      - id: create_pr
        uses: ./.github/actions/capture/create-pr
        with:
          ext: "${{ inputs.ext }}"
          color_scheme: "${{ inputs.color_scheme }}"
      - name: PR summary
        shell: bash
        env:
          PR_URL: ${{ steps.create_pr.outputs.pr-url }}
        run: |
          {
            echo "<h3>Preview pull request</h3>"
            echo "<ul>"
            echo "<li>URL: <a href=\"$PR_URL\">$PR_URL</a></li>"
            echo "</ul>"
          } >> "$GITHUB_STEP_SUMMARY"
