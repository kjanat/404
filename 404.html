<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | Kajkowalski Edge</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico">
  <style>
    :root {
      --bg-top: #060a14;
      --bg-bottom: #10203a;
      --card: rgba(10, 20, 35, 0.78);
      --text: #e8f1ff;
      --muted: #9bb2d0;
      --accent: #39c1ff;
      --accent-2: #57e2a8;
      --border: rgba(155, 178, 208, 0.3);
    }

    html,
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      padding: 24px;
      background: radial-gradient(circle at 12% 10%, rgba(57, 193, 255, 0.2), transparent 40%),
                  radial-gradient(circle at 90% 80%, rgba(87, 226, 168, 0.15), transparent 45%),
                  linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      background-size: 150% 150%, 150% 150%, 110% 110%;
      background-position: 0% 0%, 100% 100%, 50% 50%;
      color: var(--text);
      font-family: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
      animation: storm-shift 24s ease-in-out infinite alternate;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: -20%;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 12% 22%, rgba(220, 240, 255, 0.82), rgba(220, 240, 255, 0) 30%),
        radial-gradient(circle at 78% 18%, rgba(180, 230, 255, 0.7), rgba(180, 230, 255, 0) 32%),
        radial-gradient(circle at 64% 75%, rgba(140, 210, 255, 0.65), rgba(140, 210, 255, 0) 28%);
      mix-blend-mode: screen;
      opacity: 0;
      z-index: 0;
      animation: lightning-flash 13s linear infinite;
    }

    body::after {
      background:
        radial-gradient(circle at 12% 78%, rgba(3, 8, 16, 0.55), transparent 45%),
        radial-gradient(circle at 88% 26%, rgba(3, 8, 16, 0.5), transparent 40%),
        repeating-linear-gradient(120deg,
          rgba(255, 255, 255, 0.018) 0 14px,
          rgba(255, 255, 255, 0.003) 14px 28px);
      filter: blur(18px);
      opacity: 0.3;
      z-index: 0;
      animation: cloud-drift 24s ease-in-out infinite alternate;
    }

    .storm-regions {
      position: absolute;
      inset: -14%;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(45% 45% at 16% 22%, rgba(0, 0, 0, 0.62), transparent 62%),
        radial-gradient(42% 42% at 82% 24%, rgba(0, 0, 0, 0.56), transparent 64%),
        radial-gradient(46% 46% at 64% 82%, rgba(0, 0, 0, 0.68), transparent 60%);
      mix-blend-mode: multiply;
      opacity: 0.42;
      animation: region-dim 13s linear infinite;
    }

    .storm-streaks {
      position: absolute;
      inset: -16%;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: screen;
    }

    .storm-streak {
      position: absolute;
      width: 14px;
      height: 78vh;
      opacity: 0;
      filter: drop-shadow(0 0 10px rgba(200, 235, 255, 0.85));
    }

    .storm-streak::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        rgba(228, 246, 255, 0.96) 0%,
        rgba(172, 226, 255, 0.88) 50%,
        rgba(122, 198, 255, 0.08) 100%);
      clip-path: polygon(44% 0, 64% 12%, 47% 31%, 74% 47%, 40% 67%, 63% 84%, 36% 100%, 52% 66%, 30% 46%, 50% 28%, 28% 12%);
    }

    .storm-streak-a {
      left: 15%;
      top: -8%;
      transform: rotate(11deg);
      animation: bolt-a 13s linear infinite;
    }

    .storm-streak-b {
      left: 69%;
      top: -11%;
      transform: rotate(-8deg) scale(0.9);
      animation: bolt-b 13s linear infinite;
    }

    .storm-streak-c {
      left: 50%;
      top: -14%;
      transform: rotate(4deg) scale(0.72);
      animation: bolt-c 13s linear infinite;
    }

    @keyframes storm-shift {
      0% {
        background-position: 0% 0%, 100% 100%, 50% 50%;
      }
      50% {
        background-position: 12% 6%, 86% 95%, 56% 48%;
      }
      100% {
        background-position: 20% 12%, 80% 88%, 60% 45%;
      }
    }

    @keyframes cloud-drift {
      0% {
        transform: translate3d(-2%, 0, 0) scale(1.02);
      }
      50% {
        transform: translate3d(1%, -1%, 0) scale(1.05);
      }
      100% {
        transform: translate3d(3%, 1%, 0) scale(1.03);
      }
    }

    @keyframes lightning-flash {
      0%, 6%, 10%, 22%, 26%, 44%, 48%, 100% {
        opacity: 0;
      }
      6.3%, 10.4%, 22.2%, 44.4%, 48.5% {
        opacity: 0.2;
      }
      6.5%, 10.9%, 22.6%, 44.7%, 48.7% {
        opacity: 0.72;
      }
      6.8%, 11.1%, 23%, 45%, 49% {
        opacity: 0.24;
      }
    }

    @keyframes region-dim {
      0% {
        opacity: 0.44;
        transform: translate3d(0, 0, 0) scale(1);
      }
      6.2% {
        opacity: 0.74;
      }
      6.5% {
        opacity: 0.16;
      }
      6.9% {
        opacity: 0.58;
      }
      10.7% {
        opacity: 0.76;
      }
      11% {
        opacity: 0.18;
      }
      22.4% {
        opacity: 0.78;
        transform: translate3d(1%, -1%, 0) scale(1.03);
      }
      22.7% {
        opacity: 0.2;
      }
      44.6% {
        opacity: 0.75;
      }
      44.9% {
        opacity: 0.2;
      }
      48.6% {
        opacity: 0.8;
        transform: translate3d(-1%, 1%, 0) scale(1.05);
      }
      48.9% {
        opacity: 0.22;
      }
      100% {
        opacity: 0.46;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes bolt-a {
      0%, 6.35%, 6.52%, 100% {
        opacity: 0;
      }
      6.41% {
        opacity: 0.88;
      }
      6.47% {
        opacity: 0.28;
      }
      22.45%, 22.59%, 22.69% {
        opacity: 0;
      }
      22.53% {
        opacity: 0.82;
      }
      22.63% {
        opacity: 0.24;
      }
    }

    @keyframes bolt-b {
      0%, 10.78%, 10.95%, 100% {
        opacity: 0;
      }
      10.84% {
        opacity: 0.9;
      }
      10.92% {
        opacity: 0.3;
      }
      44.63%, 44.78%, 44.9% {
        opacity: 0;
      }
      44.72% {
        opacity: 0.86;
      }
      44.84% {
        opacity: 0.32;
      }
    }

    @keyframes bolt-c {
      0%, 48.62%, 48.82%, 100% {
        opacity: 0;
      }
      48.72% {
        opacity: 0.84;
      }
      48.79% {
        opacity: 0.27;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body,
      body::before,
      body::after,
      .storm-regions,
      .storm-streak,
      .edge-icon,
      h1,
      .panel,
      .panel::after,
      .edge-word::after {
        animation: none !important;
      }

      .storm-streak {
        opacity: 0 !important;
      }

      body::before {
        opacity: 0.06;
      }

      body::after {
        opacity: 0.1;
      }

      .storm-regions {
        opacity: 0.16;
      }

      .panel {
        border-color: rgba(155, 178, 208, 0.22);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
      }

      h1 {
        text-shadow: none;
      }
    }

    body.calm-mode,
    body.calm-mode::before,
    body.calm-mode::after,
    body.calm-mode .storm-regions,
    body.calm-mode .storm-streak,
    body.calm-mode .edge-icon,
    body.calm-mode h1,
    body.calm-mode .panel,
    body.calm-mode .panel::after,
    body.calm-mode .edge-word::after {
      animation: none !important;
    }

    body.calm-mode .storm-streak {
      opacity: 0 !important;
    }

    body.calm-mode::before {
      opacity: 0.06;
    }

    body.calm-mode::after {
      opacity: 0.1;
    }

    body.calm-mode .storm-regions {
      opacity: 0.16;
    }

    body.calm-mode .panel {
      border-color: rgba(155, 178, 208, 0.22);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
    }

    body.calm-mode h1 {
      text-shadow: none;
    }

    .panel {
      width: min(680px, 100%);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      backdrop-filter: blur(6px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      position: relative;
      overflow: hidden;
      z-index: 2;
      animation: panel-flicker 13s linear infinite;
    }

    .panel > * {
      max-width: 100%;
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(65% 42% at 22% 4%, rgba(166, 226, 255, 0.85), rgba(166, 226, 255, 0) 66%),
        radial-gradient(65% 42% at 74% 2%, rgba(124, 199, 255, 0.74), rgba(124, 199, 255, 0) 68%);
      mix-blend-mode: screen;
      animation: panel-afterglow 13s linear infinite;
    }

    @keyframes panel-flicker {
      0%, 6%, 10%, 22%, 26%, 44%, 48%, 100% {
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        border-color: rgba(155, 178, 208, 0.3);
      }
      6.5%, 10.9%, 22.6%, 44.7%, 48.7% {
        box-shadow: 0 26px 66px rgba(57, 193, 255, 0.24);
        border-color: rgba(87, 226, 168, 0.6);
      }
      6.9%, 11.1%, 23%, 45%, 49% {
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
      }
    }

    @keyframes panel-afterglow {
      0%, 6.4%, 10.8%, 22.5%, 44.6%, 48.6%, 100% {
        opacity: 0;
      }
      6.55%, 10.95%, 22.65%, 44.75%, 48.75% {
        opacity: 0.72;
      }
      7.2%, 11.6%, 23.4%, 45.5%, 49.6% {
        opacity: 0.24;
      }
      8.2%, 12.5%, 24.8%, 46.9%, 51.1% {
        opacity: 0.08;
      }
    }

    .kicker {
      font-size: 0.8rem;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0;
    }

    .edge-word {
      position: relative;
      cursor: help;
      text-decoration: underline;
      text-decoration-color: rgba(57, 193, 255, 0.55);
      text-underline-offset: 0.2em;
      text-decoration-thickness: 0.12em;
    }

    .edge-word::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%) translateY(6px) scale(0.96);
      min-width: 210px;
      max-width: 280px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(155, 178, 208, 0.45);
      background: rgba(11, 16, 32, 0.95);
      color: var(--text);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1.35;
      text-transform: none;
      pointer-events: none;
      opacity: 0;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.35);
      transition: opacity 180ms ease, transform 220ms ease;
      z-index: 8;
    }

    .edge-word::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: calc(100% + 5px);
      transform: translateX(-50%) rotate(45deg);
      width: 10px;
      height: 10px;
      border-right: 1px solid rgba(155, 178, 208, 0.45);
      border-bottom: 1px solid rgba(155, 178, 208, 0.45);
      background: rgba(11, 16, 32, 0.95);
      opacity: 0;
      transition: opacity 180ms ease, transform 220ms ease;
      z-index: 7;
    }

    .edge-word:hover::after,
    .edge-word:focus-visible::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
      animation: tip-glow 1.3s ease-in-out infinite;
    }

    .edge-word:hover::before,
    .edge-word:focus-visible::before {
      opacity: 1;
      transform: translateX(-50%) rotate(45deg);
    }

    @keyframes tip-glow {
      0%,
      100% {
        box-shadow: 0 12px 26px rgba(0, 0, 0, 0.35);
      }
      50% {
        box-shadow: 0 14px 30px rgba(57, 193, 255, 0.28);
      }
    }

    .brandline {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .edge-icon {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(155, 178, 208, 0.4), 0 8px 20px rgba(0, 0, 0, 0.35);
      animation: icon-blink 13s linear infinite;
    }

    @keyframes icon-blink {
      0%, 6%, 10%, 22%, 26%, 44%, 48%, 100% {
        opacity: 1;
        filter: brightness(1);
      }
      6.4%, 10.8%, 22.5%, 44.6%, 48.6% {
        opacity: 0.05;
        filter: brightness(0.45);
      }
      6.5%, 10.9%, 22.6%, 44.7%, 48.7% {
        opacity: 1;
        filter: brightness(1.85);
      }
      6.8%, 11.1%, 23%, 45%, 49% {
        opacity: 0.26;
        filter: brightness(0.8);
      }
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 4.2vw, 2.5rem);
      line-height: 1.15;
      animation: title-flicker 13s linear infinite;
      overflow-wrap: anywhere;
    }

    @keyframes title-flicker {
      0%, 6%, 10%, 22%, 26%, 44%, 48%, 100% {
        opacity: 1;
        text-shadow: 0 0 0 rgba(57, 193, 255, 0);
      }
      6.5%, 10.9%, 22.6%, 44.7%, 48.7% {
        opacity: 0.86;
        text-shadow: 0 0 18px rgba(57, 193, 255, 0.65);
      }
      6.8%, 11.1%, 23%, 45%, 49% {
        opacity: 0.94;
        text-shadow: 0 0 8px rgba(87, 226, 168, 0.35);
      }
    }

    p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1.04rem;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .host-name {
      color: var(--accent-2);
      font-weight: 700;
      word-break: break-all;
    }

    @media (max-width: 560px) {
      .panel {
        padding: 22px;
        border-radius: 16px;
      }

      p {
        font-size: 0.98rem;
      }

      .edge-word::after {
        left: 0;
        transform: translateX(0) translateY(6px) scale(0.96);
        min-width: 185px;
      }

      .edge-word::before {
        left: 18px;
      }

      .edge-word:hover::after,
      .edge-word:focus-visible::after {
        transform: translateX(0) translateY(0) scale(1);
      }

      .edge-word:hover::before,
      .edge-word:focus-visible::before {
        transform: translateX(0) rotate(45deg);
      }
    }
  </style>
</head>
<body>
  <div class="storm-regions" aria-hidden="true"></div>
  <div class="storm-streaks" aria-hidden="true">
    <span class="storm-streak storm-streak-a"></span>
    <span class="storm-streak storm-streak-b"></span>
    <span class="storm-streak storm-streak-c"></span>
  </div>
  <main class="panel">
    <div class="brandline">
      <img class="edge-icon" src="/favicon.svg" alt="Kajkowalski Edge icon" width="28" height="28">
      <p class="kicker">Kajkowalski <span class="edge-word" tabindex="0" data-tip="I'm edging so hard right now!">Edge</span></p>
    </div>
    <h1>404 - This host is not configured.</h1>
    <p>
      <span class="host-name" data-host>this hostname</span> isn't set up yet,
      so there's nothing to show here right now. If you expected something here,
      check the address and try again.
    </p>
  </main>
  <script>
    (function () {
      const calmValue = new URLSearchParams(window.location.search).get("calm");
      const reduceMotionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
      const highContrastQuery = window.matchMedia("(prefers-contrast: more)");
      const forcedColorsQuery = window.matchMedia("(forced-colors: active)");
      const explicitCalm = calmValue && /^(1|true|yes|on)$/i.test(calmValue);
      const accessibilityCalm =
        reduceMotionQuery.matches ||
        highContrastQuery.matches ||
        forcedColorsQuery.matches;

      if (explicitCalm || accessibilityCalm) {
        document.body.classList.add("calm-mode");
      }

      const host = window.location.hostname;
      if (!host) return;
      const targets = document.querySelectorAll('[data-host]');
      for (const target of targets) {
        target.textContent = host;
      }
      document.title = "404 | " + host;
    })();
  </script>
</body>
</html>
