<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | Kajkowalski Edge</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico">
  <style>
    :root {
      --bg-top: #060a14;
      --bg-bottom: #10203a;
      --card: rgba(10, 20, 35, 0.78);
      --text: #e8f1ff;
      --muted: #9bb2d0;
      --accent: #39c1ff;
      --accent-2: #57e2a8;
      --border: rgba(155, 178, 208, 0.3);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      padding: 24px;
      background: radial-gradient(circle at 12% 10%, rgba(57, 193, 255, 0.2), transparent 40%),
                  radial-gradient(circle at 90% 80%, rgba(87, 226, 168, 0.15), transparent 45%),
                  linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      background-size: 150% 150%, 150% 150%, 110% 110%;
      background-position: 0% 0%, 100% 100%, 50% 50%;
      color: var(--text);
      font-family: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
      animation: storm-shift 24s ease-in-out infinite alternate;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: -20%;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 12% 22%, rgba(220, 240, 255, 0.82), rgba(220, 240, 255, 0) 30%),
        radial-gradient(circle at 78% 18%, rgba(180, 230, 255, 0.7), rgba(180, 230, 255, 0) 32%),
        radial-gradient(circle at 64% 75%, rgba(140, 210, 255, 0.65), rgba(140, 210, 255, 0) 28%);
      mix-blend-mode: screen;
      opacity: 0;
      z-index: 0;
      animation: lightning-flash 13s linear infinite;
    }

    body::after {
      background:
        radial-gradient(circle at 12% 78%, rgba(3, 8, 16, 0.55), transparent 45%),
        radial-gradient(circle at 88% 26%, rgba(3, 8, 16, 0.5), transparent 40%),
        repeating-linear-gradient(120deg,
          rgba(255, 255, 255, 0.018) 0 14px,
          rgba(255, 255, 255, 0.003) 14px 28px);
      filter: blur(18px);
      opacity: 0.3;
      z-index: 0;
      animation: cloud-drift 24s ease-in-out infinite alternate;
    }

    .storm-regions {
      position: absolute;
      inset: -14%;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(45% 45% at 16% 22%, rgba(0, 0, 0, 0.62), transparent 62%),
        radial-gradient(42% 42% at 82% 24%, rgba(0, 0, 0, 0.56), transparent 64%),
        radial-gradient(46% 46% at 64% 82%, rgba(0, 0, 0, 0.68), transparent 60%);
      mix-blend-mode: multiply;
      opacity: 0.42;
      animation: region-dim 13s linear infinite;
    }

    @keyframes storm-shift {
      0% {
        background-position: 0% 0%, 100% 100%, 50% 50%;
      }
      50% {
        background-position: 12% 6%, 86% 95%, 56% 48%;
      }
      100% {
        background-position: 20% 12%, 80% 88%, 60% 45%;
      }
    }

    @keyframes cloud-drift {
      0% {
        transform: translate3d(-2%, 0, 0) scale(1.02);
      }
      50% {
        transform: translate3d(1%, -1%, 0) scale(1.05);
      }
      100% {
        transform: translate3d(3%, 1%, 0) scale(1.03);
      }
    }

    @keyframes lightning-flash {
      0%, 6%, 10%, 22%, 26%, 44%, 48%, 100% {
        opacity: 0;
      }
      6.3%, 10.4%, 22.2%, 44.4%, 48.5% {
        opacity: 0.2;
      }
      6.5%, 10.9%, 22.6%, 44.7%, 48.7% {
        opacity: 0.72;
      }
      6.8%, 11.1%, 23%, 45%, 49% {
        opacity: 0.24;
      }
    }

    @keyframes region-dim {
      0% {
        opacity: 0.44;
        transform: translate3d(0, 0, 0) scale(1);
      }
      6.2% {
        opacity: 0.74;
      }
      6.5% {
        opacity: 0.16;
      }
      6.9% {
        opacity: 0.58;
      }
      10.7% {
        opacity: 0.76;
      }
      11% {
        opacity: 0.18;
      }
      22.4% {
        opacity: 0.78;
        transform: translate3d(1%, -1%, 0) scale(1.03);
      }
      22.7% {
        opacity: 0.2;
      }
      44.6% {
        opacity: 0.75;
      }
      44.9% {
        opacity: 0.2;
      }
      48.6% {
        opacity: 0.8;
        transform: translate3d(-1%, 1%, 0) scale(1.05);
      }
      48.9% {
        opacity: 0.22;
      }
      100% {
        opacity: 0.46;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body,
      body::before,
      body::after,
      .storm-regions,
      .edge-icon,
      h1,
      .panel,
      .edge-word::after {
        animation: none !important;
      }
    }

    .panel {
      width: min(680px, 100%);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      backdrop-filter: blur(6px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      position: relative;
      z-index: 2;
      animation: panel-flicker 13s linear infinite;
    }

    @keyframes panel-flicker {
      0%, 6%, 10%, 22%, 26%, 44%, 48%, 100% {
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        border-color: rgba(155, 178, 208, 0.3);
      }
      6.5%, 10.9%, 22.6%, 44.7%, 48.7% {
        box-shadow: 0 26px 66px rgba(57, 193, 255, 0.24);
        border-color: rgba(87, 226, 168, 0.6);
      }
      6.9%, 11.1%, 23%, 45%, 49% {
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
      }
    }

    .kicker {
      font-size: 0.8rem;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0;
    }

    .edge-word {
      position: relative;
      cursor: help;
      text-decoration: underline;
      text-decoration-color: rgba(57, 193, 255, 0.55);
      text-underline-offset: 0.2em;
      text-decoration-thickness: 0.12em;
    }

    .edge-word::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%) translateY(6px) scale(0.96);
      min-width: 210px;
      max-width: 280px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(155, 178, 208, 0.45);
      background: rgba(11, 16, 32, 0.95);
      color: var(--text);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1.35;
      text-transform: none;
      pointer-events: none;
      opacity: 0;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.35);
      transition: opacity 180ms ease, transform 220ms ease;
      z-index: 8;
    }

    .edge-word::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: calc(100% + 5px);
      transform: translateX(-50%) rotate(45deg);
      width: 10px;
      height: 10px;
      border-right: 1px solid rgba(155, 178, 208, 0.45);
      border-bottom: 1px solid rgba(155, 178, 208, 0.45);
      background: rgba(11, 16, 32, 0.95);
      opacity: 0;
      transition: opacity 180ms ease, transform 220ms ease;
      z-index: 7;
    }

    .edge-word:hover::after,
    .edge-word:focus-visible::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
      animation: tip-glow 1.3s ease-in-out infinite;
    }

    .edge-word:hover::before,
    .edge-word:focus-visible::before {
      opacity: 1;
      transform: translateX(-50%) rotate(45deg);
    }

    @keyframes tip-glow {
      0%,
      100% {
        box-shadow: 0 12px 26px rgba(0, 0, 0, 0.35);
      }
      50% {
        box-shadow: 0 14px 30px rgba(57, 193, 255, 0.28);
      }
    }

    .brandline {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .edge-icon {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(155, 178, 208, 0.4), 0 8px 20px rgba(0, 0, 0, 0.35);
      animation: icon-blink 13s linear infinite;
    }

    @keyframes icon-blink {
      0%, 6%, 10%, 22%, 26%, 44%, 48%, 100% {
        opacity: 1;
        filter: brightness(1);
      }
      6.4%, 10.8%, 22.5%, 44.6%, 48.6% {
        opacity: 0.05;
        filter: brightness(0.45);
      }
      6.5%, 10.9%, 22.6%, 44.7%, 48.7% {
        opacity: 1;
        filter: brightness(1.85);
      }
      6.8%, 11.1%, 23%, 45%, 49% {
        opacity: 0.26;
        filter: brightness(0.8);
      }
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 4.2vw, 2.5rem);
      line-height: 1.15;
      animation: title-flicker 13s linear infinite;
    }

    @keyframes title-flicker {
      0%, 6%, 10%, 22%, 26%, 44%, 48%, 100% {
        opacity: 1;
        text-shadow: 0 0 0 rgba(57, 193, 255, 0);
      }
      6.5%, 10.9%, 22.6%, 44.7%, 48.7% {
        opacity: 0.86;
        text-shadow: 0 0 18px rgba(57, 193, 255, 0.65);
      }
      6.8%, 11.1%, 23%, 45%, 49% {
        opacity: 0.94;
        text-shadow: 0 0 8px rgba(87, 226, 168, 0.35);
      }
    }

    p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1.04rem;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--accent-2);
      font-size: 0.84rem;
      letter-spacing: 0.02em;
    }

    .host-name {
      color: var(--accent-2);
      font-weight: 700;
      word-break: break-all;
    }

    @media (max-width: 560px) {
      .panel {
        padding: 22px;
        border-radius: 16px;
      }

      p {
        font-size: 0.98rem;
      }

      .edge-word::after {
        left: 0;
        transform: translateX(0) translateY(6px) scale(0.96);
        min-width: 185px;
      }

      .edge-word::before {
        left: 18px;
      }

      .edge-word:hover::after,
      .edge-word:focus-visible::after {
        transform: translateX(0) translateY(0) scale(1);
      }

      .edge-word:hover::before,
      .edge-word:focus-visible::before {
        transform: translateX(0) rotate(45deg);
      }
    }
  </style>
</head>
<body>
  <div class="storm-regions" aria-hidden="true"></div>
  <main class="panel">
    <div class="brandline">
      <img class="edge-icon" src="/favicon.svg" alt="Kajkowalski Edge icon" width="28" height="28">
      <p class="kicker">Kajkowalski <span class="edge-word" tabindex="0" data-tip="I'm edging so hard right now!">Edge</span></p>
    </div>
    <h1>404 - This host is not configured.</h1>
    <p>
      <span class="host-name" data-host>this hostname</span> isn't set up yet,
      so there's nothing to show here right now. If you expected something here,
      check the address and try again.
    </p>
    <span class="badge">Request closed cleanly</span>
  </main>
  <script>
    (function () {
      const host = window.location.hostname;
      if (!host) return;
      const targets = document.querySelectorAll('[data-host]');
      for (const target of targets) {
        target.textContent = host;
      }
      document.title = "404 | " + host;
    })();
  </script>
</body>
</html>
